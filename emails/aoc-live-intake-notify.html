<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="x-apple-disable-message-reformatting">
<title>AOC Live ticket sold</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#0a0a0a;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f5f6f8;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" width="560" style="background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;">
          <tr>
            <td style="padding:24px 28px;background-color:#0a0a0a;color:#ffffff;">
              <div style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#38B6FF;margin-bottom:8px;">AOC Live &middot; West Palm Beach &middot; Jul 11, 2026</div>
              <div style="font-size:22px;font-weight:700;letter-spacing:-0.01em;">New ticket sold</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="font-size:14px;line-height:1.5;">
                <tr>
                  <td style="padding:8px 0;color:#6b7280;width:140px;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;">Name</td>
                  <td style="padding:8px 0;color:#0a0a0a;font-weight:500;">{{fullName}}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#6b7280;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;">Email</td>
                  <td style="padding:8px 0;color:#0a0a0a;font-weight:500;"><a href="mailto:{{email}}" style="color:#1d7fc0;text-decoration:none;">{{email}}</a></td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#6b7280;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;">Phone</td>
                  <td style="padding:8px 0;color:#0a0a0a;font-weight:500;"><a href="tel:{{phone}}" style="color:#1d7fc0;text-decoration:none;">{{phone}}</a></td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#6b7280;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;">Amount</td>
                  <td style="padding:8px 0;color:#0a0a0a;font-weight:500;">{{amount}}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0;color:#6b7280;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;">Confirmed</td>
                  <td style="padding:8px 0;color:#0a0a0a;font-weight:500;">{{submittedAt}}</td>
                </tr>
              </table>
              <p style="margin:24px 0 0;padding-top:16px;border-top:1px solid #e5e7eb;font-size:12px;color:#6b7280;line-height:1.55;">
                Stripe checkout completed. The intake row in <code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;">aoc_live_intake</code> has been marked purchased, and the buyer confirmation has been sent.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
