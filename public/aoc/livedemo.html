.q-opt {

  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.q-opt:hover { border-color: var(--accent-border); background: var(--bg-surface-hover); }
.q-opt::after { content: ""; width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--fg-ghost); flex-shrink: 0; transition: all .2s var(--ease-smooth); }

.q-opt.is-selected::after { border-color: var(--accent); background: var(--accent); box-shadow: 0 0 0 4px var(--accent-subtle); }

/* one-question-at-a-time transition */
.q-card.leaving { opacity: 0; transform: translateX(-18px); }
.q-card.entering { opacity: 0; transform: translateX(18px); }
.q-card { opacity: 1; transform: translateX(0); transition: opacity .28s var(--ease-out), transform .28s var(--ease-out); }
@media (prefers-reduced-motion: reduce) {
  .q-card, .q-card.leaving, .q-card.entering { transition: none !important; transform: none !important; opacity: 1 !important; }
  .quiz-progress-fill { transition: none !important; }
}

/* ===== STATE 3 — texting form ===== */
.ld-form { display: flex; flex-direction: column; gap: var(--space-3); width: 100%; max-width: 420px; margin: var(--space-8) auto 0; text-align: left; }

.ld-form .ld-btn { width: 100%; margin-top: var(--space-2); }

/* ===== STATE 2 — booking / Calendly ===== */
.calendly-inline-widget { width: 100%; min-height: 720px; }
.booking-placeholder { width: 100%; max-width: 560px; margin: var(--space-8) auto 0; padding: var(--space-16) var(--space-6); border: 1px dashed var(--accent-border); border-radius: var(--radius-lg); background: var(--accent-subtle); color: var(--fg-muted); }

/* ===== FOOTER (matches /aoc/join family) ===== */

<script>
/* ============================================================================
   /aoc/livedemo — full-page qualification funnel (state machine)
   ============================================================================ */

/* ---- State machine -------------------------------------------------------- */
function setState(name) {
  document.body.dataset.state = name;
  // progress bar belongs to the quiz only
  document.getElementById('quizProgress').style.display = (name === 'quiz') ? 'block' : 'none';
  window.scrollTo(0, 0);
  if (name === 'booking') mountCalendly();
}

/* ---- STATE 1: quiz -------------------------------------------------------- */
const QUESTIONS = [
  { key: 'q1', q: "How long have you had a real estate media business?",
    opts: ["Haven't started yet", "0-1 years", "1-3 years", "3+ years"] },
  { key: 'q2', q: "How much are you earning per month in your real estate media business currently?",
    opts: ["$0-$1,000", "$1,000-$3,000", "$3,000-$5,000", "$5,000-$10,000", "$10,000+"] },
  { key: 'q3', q: "What's most important for you to improve on to take your business from where it is now to where you want it to be?",
    opts: ["Shooting", "Editing", "Sales", "Team Building", "All of the above"] },
  { key: 'q4', q: "If Agent on Camera is a fit and can truly support you in growing your real estate media business, are you willing to invest in yourself?",
    opts: ["Yes", "No"] },
];

// STRICT routing — must match the server predicate exactly.
const HIGH_EARNINGS = new Set(["$5,000-$10,000", "$10,000+"]);
function isQualified(a) { return HIGH_EARNINGS.has(a.q2) && a.q4 === "Yes"; }

const answers = {};
let qIdx = 0;
let locked = false; // guards double-taps during the advance animation

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function renderQuestion() {
  const card = document.getElementById('qCard');
  const item = QUESTIONS[qIdx];
  document.getElementById('quizCount').textContent = (qIdx + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('quizProgressFill').style.width = (((qIdx + 1) / QUESTIONS.length) * 100) + '%';

  const opts = item.opts.map(function (opt) {
    return '<button type="button" class="q-opt" data-opt="' + opt.replace(/"/g, '&quot;') + '">' +
             '<span>' + opt + '</span></button>';
  }).join('');
  card.innerHTML = '<p class="q-text">' + item.q + '</p><div class="q-opts">' + opts + '</div>';

  card.querySelectorAll('.q-opt').forEach(function (btn) {
    btn.addEventListener('click', function () { selectOption(btn); });
  });
}

function selectOption(btn) {
  if (locked) return;
  locked = true;
  const opt = btn.getAttribute('data-opt');
  answers[QUESTIONS[qIdx].key] = opt;
  btn.classList.add('is-selected');
  const delay = reduceMotion ? 0 : 260;
  setTimeout(advance, delay);
}

function advance() {
  const card = document.getElementById('qCard');
  const isLast = qIdx >= QUESTIONS.length - 1;

  function swap() {
    if (isLast) { finishQuiz(); return; }
    qIdx++;
    renderQuestion();
    if (!reduceMotion) {
      card.classList.remove('leaving');
      card.classList.add('entering');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { card.classList.remove('entering'); locked = false; });
      });
    } else { locked = false; }
  }

  if (reduceMotion) { swap(); return; }
  card.classList.add('leaving');
  setTimeout(swap, 280);
}

function finishQuiz() {
  setState(isQualified(answers) ? 'booking' : 'texting');
  locked = false;
}

/* ---- STATE 2: Calendly (mounted on demand) -------------------------------- */
let calendlyMounted = false;
function mountCalendly() {
  if (calendlyMounted) return;
  calendlyMounted = true;
  const mount = document.getElementById('calendlyMount');
  if (CALENDLY_URL) {
    const widget = document.createElement('div');
    widget.className = 'calendly-inline-widget';
    widget.setAttribute('data-url', CALENDLY_URL);
    mount.appendChild(widget);
    const s = document.createElement('script');
    s.src = 'https://assets.calendly.com/assets/external/widget.js';
    s.async = true;
    document.body.appendChild(s);
  } else {
    // No link pasted yet — show a labeled placeholder, never an empty iframe.
    mount.innerHTML = '<div class="booking-placeholder">Booking calendar coming — the Calendly link will be added here.</div>';
  }
}

// Calendly fires a postMessage when a booking completes → advance to STATE 4.
window.addEventListener('message', function (e) {
  if (e && e.data && e.data.event === 'calendly.event_scheduled') { onBooked(); }
});
document.getElementById('bookedFallback').addEventListener('click', onBooked);

let bookedSubmitted = false;
function onBooked() {
  if (bookedSubmitted) { setState('postbook'); return; }
  bookedSubmitted = true;
  // Backend POST wired in commit 7. For now, just advance.
  setState('postbook');
}

/* ---- init ----------------------------------------------------------------- */
renderQuestion();
setState('quiz');
</script>
